
num_rotors: 4

# vehicle config
stage_prefix: quadrotor
usd_file: 
rotor_constant:
- 8.54858e-6
- 8.54858e-6
- 8.54858e-6
- 8.54858e-6
rolling_moment_coefficient:
- 1.0e-6
- 1.0e-6
- 1.0e-6
- 1.0e-6
rot_dir:
- -1.0
- -1.0
- 1.0
- 1.0
min_rotor_velocity:
- 0.0
- 0.0
- 0.0
- 0.0
max_rotor_velocity:
- 1100.0
- 1100.0
- 1100.0
- 1100.0
drag:
- 0.50
- 0.30
- 0.00
use_barometer: true
use_imu: true
use_magnetometer: true
use_gps: true

#lidar_config
lidar_list:
- lidar_name: lidar_01
  lidar_config:
    frequency: 10.0
    sensor_configuration: OS1_REV6_32ch10hz2048res
    position:
    - 0.0
    - 0.0
    - 0.1
    orientation:
    - 0.0
    - 0.0
    - 0.0
    show_render: True
